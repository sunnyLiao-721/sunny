<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京行程 12/9–12/13</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1612; --paper:#faf8f4; --cream:#f2ede4; --accent:#c0392b;
  --accent-light:#f9ecea; --gold:#8B6914; --gold-light:#f5f0e4;
  --muted:#7a736a; --border:#ddd8cf; --teal:#0f6e56; --teal-light:#e8f5f1;
  --blue:#185fa5; --blue-light:#e8f1fa; --purple:#3C3489; --purple-light:#eeedfe;
  --green:#27500a; --green-light:#eaf3de; --pink:#72243e; --pink-light:#fbeaf0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.7;padding-top:52px;}

/* TOOLBAR */
.toolbar{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--ink);display:flex;align-items:center;gap:8px;padding:8px 18px;box-shadow:0 2px 12px rgba(0,0,0,.35);min-height:52px;}
.tb-logo{font-family:'Noto Serif TC',serif;font-size:15px;color:#fff;font-weight:600;margin-right:4px;}
.tb-logo span{color:var(--accent);}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 4px;}
.tb-btn{font-size:12px;font-weight:500;padding:5px 13px;border-radius:99px;cursor:pointer;border:none;font-family:inherit;transition:all .15s;}
.tb-btn.edit-on{background:var(--accent);color:#fff;}
.tb-btn.edit-on:hover{background:#a93226;}
.tb-btn.normal{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);border:0.5px solid rgba(255,255,255,.2);}
.tb-btn.normal:hover{background:rgba(255,255,255,.18);}
.tb-btn.danger{background:transparent;color:rgba(255,130,110,.85);border:0.5px solid rgba(255,100,80,.3);}
.tb-btn.danger:hover{background:rgba(255,100,80,.1);}
.tb-saved{font-size:11px;color:#6bcf6b;opacity:0;transition:opacity .4s;white-space:nowrap;}
.tb-saved.show{opacity:1;}
.tb-spacer{flex:1;}
.edit-hint{display:none;font-size:11px;color:var(--accent);background:var(--accent-light);border-radius:6px;padding:8px 14px;margin:12px 0 -4px;text-align:center;}
body.edit-on .edit-hint{display:block;}

/* COVER */
.cover{background:var(--ink);color:var(--paper);padding:52px 48px 40px;position:relative;overflow:hidden;}
.cover::before{content:'東京';position:absolute;right:-20px;top:-30px;font-family:'Noto Serif TC',serif;font-size:200px;font-weight:600;color:rgba(255,255,255,.04);line-height:1;pointer-events:none;}
.cover-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.cover-title{font-family:'Noto Serif TC',serif;font-size:38px;font-weight:600;line-height:1.2;margin-bottom:6px;}
.cover-sub{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:28px;}
.cover-pills{display:flex;gap:8px;flex-wrap:wrap;}
.cover-pill{font-size:12px;padding:4px 12px;border:0.5px solid rgba(255,255,255,.22);border-radius:99px;color:rgba(255,255,255,.72);}

/* LAYOUT */
.container{max-width:860px;margin:0 auto;padding:0 24px 60px;}
.sec-header{display:flex;align-items:center;gap:10px;margin:36px 0 14px;padding-bottom:9px;border-bottom:1.5px solid var(--ink);}
.sec-num{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:600;color:var(--accent);line-height:1;min-width:28px;}
.sec-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:600;}
.sec-actions{margin-left:auto;display:flex;gap:6px;}

/* TABLES */
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:7px 11px;background:var(--cream);border-bottom:1px solid var(--border);}
td{padding:10px 11px;border-bottom:0.5px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}

/* BADGES */
.badge{display:inline-block;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;}
.b-red{background:var(--accent-light);color:var(--accent);}
.b-teal{background:var(--teal-light);color:var(--teal);}
.b-gold{background:var(--gold-light);color:var(--gold);}
.b-blue{background:var(--blue-light);color:var(--blue);}
.b-purple{background:var(--purple-light);color:var(--purple);}
.b-gray{background:var(--cream);color:var(--muted);}
.b-green{background:var(--green-light);color:var(--green);}
.b-pink{background:var(--pink-light);color:var(--pink);}

/* DAY CARDS */
.day-card{border:1px solid var(--border);border-radius:10px;margin-bottom:18px;overflow:hidden;}
.day-header{background:var(--ink);color:var(--paper);padding:13px 16px;display:flex;align-items:center;gap:12px;}
.day-num{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:600;color:var(--accent);line-height:1;min-width:34px;}
.day-info{flex:1;}
.day-date{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.05em;}
.day-theme{font-size:14px;font-weight:500;}
.day-actions{display:flex;gap:5px;}

/* TIMELINE */
.timeline{list-style:none;}
.tl-item{display:grid;grid-template-columns:62px 18px 1fr auto;gap:0 10px;padding:11px 16px;border-bottom:0.5px solid var(--border);align-items:start;}
.tl-item:last-child{border-bottom:none;}
.tl-time{font-size:11.5px;font-weight:500;color:var(--muted);padding-top:2px;text-align:right;white-space:nowrap;}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:5px;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
.tl-dot.red{background:var(--accent);}
.tl-dot.gold{background:var(--gold);}
.tl-dot.teal{background:var(--teal);}
.tl-line{width:1px;flex:1;min-height:22px;background:var(--border);margin-top:3px;}
.tl-content{min-width:0;}
.tl-label{font-size:13px;font-weight:500;margin-bottom:2px;}
.tl-desc{font-size:12px;color:var(--muted);line-height:1.55;}
.tl-transport{display:flex;align-items:flex-start;gap:6px;background:var(--cream);border-radius:5px;padding:5px 9px;margin-top:5px;}
.tl-transport-icon{font-size:12px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.tl-transport-text{font-size:11.5px;color:var(--muted);line-height:1.5;}
.tl-actions{display:flex;align-items:flex-start;gap:4px;padding-top:2px;}
.note-box{background:var(--gold-light);border:0.5px solid #d4bc7a;border-radius:5px;padding:8px 12px;font-size:12px;color:var(--gold);margin-top:6px;}
.link-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
a.lbtn{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;border:0.5px solid var(--border);color:var(--ink);text-decoration:none;background:var(--cream);display:inline-block;}
a.lbtn:hover{background:var(--border);}
.option-block{border-left:3px solid var(--accent);padding:7px 12px;margin:6px 0;background:var(--accent-light);border-radius:0 5px 5px 0;}
.option-label{font-size:11px;font-weight:500;color:var(--accent);margin-bottom:2px;letter-spacing:.04em;}
.option-text{font-size:12.5px;}

/* COST GRID */
.cost-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.cost-card{background:var(--cream);border-radius:7px;padding:12px 14px;position:relative;}
.cost-label{font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.03em;}
.cost-val{font-size:21px;font-weight:500;font-family:'Noto Serif TC',serif;}
.cost-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* EDIT CONTROLS */
.add-btn{display:none;font-size:11.5px;font-weight:500;padding:4px 12px;border-radius:99px;cursor:pointer;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s;white-space:nowrap;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
body.edit-on .add-btn{display:inline-flex;align-items:center;gap:4px;}

.del-btn{display:none;background:none;border:none;cursor:pointer;font-size:14px;opacity:.35;padding:2px 4px;border-radius:4px;transition:all .15s;line-height:1;flex-shrink:0;}
.del-btn:hover{opacity:1;background:var(--accent-light);}
body.edit-on .del-btn{display:inline-block;}

/* SHOPPING LIST */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:10px;}
.shop-cat{border:1px solid var(--border);border-radius:99px;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.shop-cat-header{background:var(--ink);color:var(--paper);padding:10px 14px;display:flex;align-items:center;gap:8px;}
.shop-cat-icon{font-size:16px;line-height:1;}
.shop-cat-name{font-size:13px;font-weight:500;flex:1;}
.shop-cat-items{list-style:none;padding:8px 0;}
.shop-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:0.5px solid var(--border);font-size:13px;}
.shop-item:last-child{border-bottom:none;}
.shop-item-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.shop-item-check.checked{background:var(--teal);border-color:var(--teal);}
.shop-item-check.checked::after{content:'✓';font-size:10px;color:#fff;font-weight:700;}
.shop-item-text{flex:1;transition:color .15s;}
.shop-item-check.checked+.shop-item-text{color:var(--muted);text-decoration:line-through;}
.shop-item-price{font-size:11px;color:var(--muted);white-space:nowrap;}
.shop-cat-footer{padding:6px 10px;border-top:0.5px dashed var(--border);}
.shop-add-item-btn{width:100%;font-size:11.5px;color:var(--muted);background:transparent;border:none;cursor:pointer;text-align:left;padding:4px 4px;font-family:inherit;display:none;}
.shop-add-item-btn:hover{color:var(--accent);}
body.edit-on .shop-add-item-btn{display:block;}
.shop-progress{height:3px;background:var(--border);border-radius:99px;margin:0 14px 10px;overflow:hidden;}
.shop-progress-bar{height:100%;background:var(--teal);border-radius:99px;transition:width .3s;}

@media print{.toolbar,.add-btn,.del-btn,.edit-hint{display:none!important;}body{padding-top:0!important;}}
@media(max-width:600px){.cover{padding:36px 16px 28px;}.cover-title{font-size:26px;}.container{padding:0 12px 40px;}.tl-item{grid-template-columns:50px 16px 1fr auto;}}

/* BUY LIST BUTTON */
.tl-location-btn {
  background: #fff0f5;
  color: #d45c8a;
  border: 1.5px solid #f4b8cf;
  padding: 3px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
  transition: all .18s;
  letter-spacing: .02em;
  box-shadow: 0 1px 4px rgba(212,92,138,.12);
}
.tl-location-btn:hover {
  background: #ffe0ed;
  border-color: #d45c8a;
  transform: scale(1.05);
}

/* MODAL */
.split-add-btn{display:inline-flex!important;align-items:center;gap:4px;}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:auto;}
.modal{background:#fff;padding:24px;border-radius:12px;width:90%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.18);position:relative;color:var(--ink);max-height:80vh;overflow-y:auto;}
.modal h3{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-btn{padding:7px 18px;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;border:1px solid var(--border);}
.modal-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.modal-btn.primary:hover{background:#333;}
.modal-btn.cancel{background:#fff;color:var(--muted);}
.modal-btn.cancel:hover{background:var(--cream);}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-row label{font-size:12px;color:var(--muted);font-weight:500;}
.form-row input,.form-row select,.form-row textarea{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;}
.form-row textarea{resize:vertical;min-height:64px;}
</style>
</head>
<body>

<div class="toolbar">
  <span class="tb-logo">東京<span>行程</span></span>
  <div class="tb-sep"></div>
  <button class="tb-btn normal" id="editToggle" onclick="toggleEdit()">✏️ 編輯</button>
  <button class="tb-btn danger" id="resetBtn" onclick="resetAll()" style="display:none">重置資料庫</button>
  <div class="tb-spacer"></div>
  <span class="tb-saved" id="savedMsg">✓ 雲端已同步</span>
  <button class="tb-btn normal" onclick="window.print()">🖨 列印</button>
</div>

<div class="cover">
  <div class="cover-label">Travel Itinerary</div>
  <div class="cover-title" contenteditable="false" onblur="updateCover()">東京五日遊</div>
  <div class="cover-sub" contenteditable="false" onblur="updateCover()">December 9–13, 2024</div>
  <div class="cover-pills" id="coverPills"></div>
</div>

<div class="container">
  <div class="edit-hint">✏️ 編輯模式已開啟 — 點擊任何文字修改；按 ➕ 新增項目；按 🗑 刪除（所有人會同步看到更改）</div>

  <div class="sec-header">
    <div class="sec-num">①</div>
    <div class="sec-title">機票時間</div>
    <div class="sec-actions">
      <button class="add-btn" onclick="openModal('flight')">＋ 新增航班</button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>日期</th><th>航段</th><th>出發</th><th>抵達</th><th>備註</th><th class="del-btn" style="width:30px"></th></tr></thead>
      <tbody id="flightBody"></tbody>
    </table>
  </div>

  <div class="sec-header">
    <div class="sec-num">②</div>
    <div class="sec-title">每日行程 & 交通時間</div>
    <div class="sec-actions">
      <button class="add-btn" onclick="openModal('day')">＋ 新增天數</button>
    </div>
  </div>
  <div id="daysContainer"></div>

  <div class="sec-header">
    <div class="sec-num">③</div>
    <div class="sec-title">各項金額</div>
    <div class="sec-actions">
      <button class="add-btn" onclick="openModal('costItem')">＋ 新增費用</button>
    </div>
  </div>
  <div class="cost-grid" id="costGrid"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>天</th><th>餐次</th><th>餐廳</th><th>類型</th><th>金額（¥）</th><th class="del-btn" style="width:30px"></th></tr></thead>
      <tbody id="costBody"></tbody>
    </table>
  </div>

  <div class="sec-header">
    <div class="sec-num">④</div>
    <div class="sec-title">森下週邊</div>
    <div class="sec-actions">
      <button class="add-btn" onclick="openModal('lunch')">＋ 新增選項</button>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>餐廳</th><th>類型</th><th>價位（¥）</th><th>地址</th><th>備註</th><th class="del-btn" style="width:30px"></th></tr></thead>
      <tbody id="lunchBody"></tbody>
    </table>
  </div>

  <div class="sec-header">
    <div class="sec-num">⑤</div>
    <div class="sec-title">必買清單</div>
    <div class="sec-actions">
      <button class="add-btn" onclick="openModal('shopCat')">＋ 新增分類</button>
    </div>
  </div>
  <div class="shop-grid" id="shopGrid"></div>

  <!-- ⑥ 分帳系統 -->
  <div class="sec-header">
    <div class="sec-num">⑥</div>
    <div class="sec-title">旅費分帳系統</div>
    <div class="sec-actions">
      <button class="add-btn split-add-btn" onclick="openSplitModal()">＋ 新增開銷</button>
    </div>
  </div>
  <div id="splitSection"></div>

  <div style="margin-top:40px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div style="font-size:11px;color:var(--muted);">東京 12/9–12/13 · 森下住宿</div>
    <div style="font-size:11px;color:var(--muted);">所有時間為估算值，請以 Google Maps 實際查詢為準</div>
  </div>
</div>

<!-- Split Modal -->
<div id="splitModalBg" class="modal-bg" onclick="if(event.target===this)closeSplitModal()">
  <div class="modal" style="max-width:480px;padding:0;overflow:hidden;">
    <div style="background:var(--ink);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:17px;">💴</span>
      <span style="font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;flex:1;" id="splitModalTitle">新增開銷</span>
      <button onclick="closeSplitModal()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;">×</button>
    </div>
    <div style="padding:18px 20px 20px;display:flex;flex-direction:column;gap:12px;">
      <div class="form-row">
        <label>項目名稱</label>
        <input type="text" id="sp_name" placeholder="例：迪士尼門票">
      </div>
      <div style="display:flex;gap:10px;">
        <div class="form-row" style="flex:1;">
          <label>金額（日幣 ¥）</label>
          <input type="number" id="sp_jpy" placeholder="0" oninput="calcTWD()">
        </div>
        <div class="form-row" style="flex:1;">
          <label>換算台幣（NT$）<span id="rateLabel" style="font-size:10px;color:var(--muted);"></span></label>
          <input type="number" id="sp_twd" placeholder="自動換算" style="background:var(--cream);" readonly>
        </div>
      </div>
      <div class="form-row">
        <label>分攤人員（可多選）</label>
        <div id="sp_members" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;"></div>
      </div>
      <div class="form-row">
        <label>付款人</label>
        <select id="sp_payer" style="width:100%;"></select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
        <button class="modal-btn cancel" onclick="closeSplitModal()">取消</button>
        <button class="modal-btn primary" onclick="submitSplit()">確認新增</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle">新增項目</h3>
    <div id="modalFields"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="submitModal()">確認新增</button>
    </div>
  </div>
</div>

<script>
// ⚠️請把下方雙引號內的網址，換成你剛才在 Firebase 複製的資料庫網址⚠️
const FIREBASE_URL = "https://tokyo-trip-2026-31406-default-rtdb.firebaseio.com/";

// ===================== DEFAULT DATA =====================
const DEFAULT = {
  coverTitle: '東京五日遊',
  coverSub: 'December 9–13, 2024',
  coverPills: ['✈ 桃園 ↔ 成田','🏠 森下住宿','🎡 迪士尼','🗼 東京鐵塔','🛍 原宿・新宿','⚡ 秋葉原'],
  flights: [
    {date:'12/9（Day 1）', route:'桃園機場 → 成田機場', dep:'06:40', arr:'10:40', note:'去程', badge:'b-blue'},
    {date:'12/13（Day 5）', route:'成田機場 → 桃園機場', dep:'19:55', arr:'23:10', note:'回程 · Skyliner 17:00 從京成上野出發，約 41 分抵達成田', badge:'b-red'},
  ],
  days: [

// ===================== STATE MANAGEMENT =====================
let state = null;
let editMode = false;
let modalType = '';
let modalCtx = {};

// 從 Firebase 載入資料
async function loadFromFirebase() {
  if (FIREBASE_URL === "換成你的資料庫網址") {
    state = JSON.parse(JSON.stringify(DEFAULT));
    render();
    return;
  }
  try {
    const res = await fetch(`${FIREBASE_URL}trip.json`);
    const data = await res.json();
    if (data) {
      state = data;
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT));
      await saveToFirebase(); // 初始化 Firebase 資料
    }
  } catch (e) {
    console.error("無法連線至 Firebase，使用預設資料", e);
    state = JSON.parse(JSON.stringify(DEFAULT));
  }
  render();
}

// 儲存資料到 Firebase
async function saveToFirebase() {
  if (FIREBASE_URL === "換成你的資料庫網址") return;
  try {
    const res = await fetch(`${FIREBASE_URL}trip.json`, {
      method: 'PUT',
      body: JSON.stringify(state)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showSavedMsg('✓ 雲端已同步', '#6bcf6b');
  } catch (e) {
    console.error("儲存失敗", e);
    showSavedMsg('⚠ 儲存失敗，請重試', '#ff8c6e');
  }
}

// 每隔 15 秒自動檢查雲端是否有新更新
let pollFailCount = 0;
function startPolling() {
  setInterval(async () => {
    if (!editMode && FIREBASE_URL !== "換成你的資料庫網址") {
      try {
        const res = await fetch(`${FIREBASE_URL}trip.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data && JSON.stringify(data) !== JSON.stringify(state)) {
          state = data;
          render();
        }
        if (pollFailCount > 0) { pollFailCount = 0; showSavedMsg(); }
      } catch(e){
        pollFailCount++;
        if (pollFailCount === 2) showSavedMsg('⚠ 雲端連線中斷，稍後重試', '#ff8c6e');
      }
    }
  }, 15000);
}

function showSavedMsg(text = '✓ 雲端已同步', color = '#6bcf6b') {
  const m = document.getElementById('savedMsg');
  if (m) {
    m.textContent = text;
    m.style.color = color;
    m.classList.add('show');
    setTimeout(() => m.classList.remove('show'), 3000);
  }
}

  if (!confirm('確定要初始化雲端資料庫，恢復原始預設內容嗎？')) return;

}

function openModal(type, ctx={}) {
  modalType = type; modalCtx = ctx;
  const titles = {flight:'新增航班', day:'新增整天行程', item:'新增行程項目', costItem:'新增費用卡片', costRow:'新增費用明細', lunch:'新增午餐選項', pill:'新增封面標籤', shopCat:'新增必買分類', shopItem:'新增品項'};
  document.getElementById('modalTitle').textContent = titles[type] || '新增';
  const fields = FIELDS[type] || [];
  document.getElementById('modalFields').innerHTML = fields.map(f => {
    if (f.type === 'select') return `<div class="form-row"><label>${f.label}</label><select id="mf_${f.id}">${f.opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join('')}</select></div>`;
    if (f.type === 'textarea') return `<div class="form-row"><label>${f.label}</label><textarea id="mf_${f.id}" placeholder="${f.ph||''}"></textarea></div>`;
    return `<div class="form-row"><label>${f.label}</label><input type="text" id="mf_${f.id}" placeholder="${f.ph||''}"></div>`;
  }).join('');
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function closeModalBg(e) { if(e.target===document.getElementById('modalBg')) closeModal(); }

function submitModal() {
  const get = id => { const el = document.getElementById('mf_'+id); return el ? el.value.trim() : ''; };
  if (modalType === 'flight') {
    state.flights.push({date:get('date'),route:get('route'),dep:get('dep'),arr:get('arr'),note:get('note'),badge:get('badge')});
  } else if (modalType === 'day') {
    state.days.push({num:parseInt(get('num'))||state.days.length+1, date:get('date'), theme:get('theme'), items:[]});
  } else if (modalType === 'item') {
    const di = modalCtx.di !== undefined ? modalCtx.di : state.days.length-1;
    if(!state.days[di].items) state.days[di].items = [];
    state.days[di].items.push({time:get('time'),dot:get('dot'),label:get('label'),desc:get('desc'),transport:get('transport'),maps:get('maps'),official:get('official'),note:get('note')});
  } else if (modalType === 'costItem') {
    state.costCards.push({label:get('label'),val:get('val'),sub:get('sub')});
  } else if (modalType === 'costRow') {
    const mealBadge = {早餐:'b-gold',午餐:'b-gray',晚餐:'b-red'};
    const meal = get('meal');
    state.costRows.push({day:get('day'),meal,rest:get('rest'),type:get('type'),price:get('price'),mealBadge:mealBadge[meal]||'b-gray'});
  } else if (modalType === 'lunch') {
    state.lunchOptions.push({name:get('name'),type:get('type'),badge:get('badge'),price:get('price'),addr:get('addr'),maps:get('maps'),note:get('note')});
  } else if (modalType === 'pill') {
    state.coverPills.push(get('text'));
  } else if (modalType === 'shopCat') {
    state.shopCategories.push({icon:get('icon')||'📦', name:get('name')||'新分類', color:get('color')||'#1a1612', items:[]});
  } else if (modalType === 'shopItem') {
    const ci = modalCtx.ci !== undefined ? modalCtx.ci : state.shopCategories.length-1;
    if(!state.shopCategories[ci].items) state.shopCategories[ci].items = [];
    state.shopCategories[ci].items.push({text:get('text'), price:get('price'), checked:false});
  }
  saveToFirebase(); render(); closeModal();
}

  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ===================== 分帳系統 =====================
let splitRate = null;

async function fetchRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/JPY');
    const data = await res.json();
    if (data && data.rates && data.rates.TWD) {
      splitRate = data.rates.TWD;
      document.getElementById('rateLabel').textContent = `(1¥≈${splitRate.toFixed(3)}NT$)`;
    }
  } catch(e) {
    splitRate = 0.22;
    document.getElementById('rateLabel') && (document.getElementById('rateLabel').textContent = '(離線匯率 1¥≈0.22NT$)');
  }
}

function calcTWD() {
  const jpy = parseFloat(document.getElementById('sp_jpy').value) || 0;
  const rate = splitRate || 0.22;
  document.getElementById('sp_twd').value = jpy ? Math.round(jpy * rate) : '';
}

function openSplitModal() {
  fetchRate();
  // render member checkboxes
  const members = (state.members && state.members.length) ? state.members : ['Sunny','小美','阿志','小華','阿明','小玲','阿強'];
  const memberDiv = document.getElementById('sp_members');
  memberDiv.innerHTML = members.map((m,i) => `
    <label style="display:flex;align-items:center;gap:5px;background:var(--cream);border:1px solid var(--border);border-radius:99px;padding:4px 12px;cursor:pointer;font-size:13px;">
      <input type="checkbox" value="${m}" checked style="accent-color:var(--accent);"> ${m}
    </label>`).join('');
  const payerSel = document.getElementById('sp_payer');
  payerSel.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('sp_name').value = '';
  document.getElementById('sp_jpy').value = '';
  document.getElementById('sp_twd').value = '';
  document.getElementById('splitModalTitle').textContent = '新增開銷';
  document.getElementById('splitModalBg').classList.add('open');
}

function closeSplitModal() {
  document.getElementById('splitModalBg').classList.remove('open');
}

function submitSplit() {
  const name = document.getElementById('sp_name').value.trim();
  const jpy = parseFloat(document.getElementById('sp_jpy').value) || 0;
  const twd = parseFloat(document.getElementById('sp_twd').value) || Math.round(jpy * (splitRate||0.22));
  const payer = document.getElementById('sp_payer').value;
  const checked = [...document.querySelectorAll('#sp_members input:checked')].map(el => el.value);
  if (!name || !jpy || !checked.length) { alert('請填寫項目名稱、金額並選擇至少一位成員'); return; }
  if (!state.splits) state.splits = [];
  state.splits.push({ name, jpy, twd, payer, members: checked, id: Date.now() });
  closeSplitModal();
  renderSplit();
  saveToFirebase();
}

function delSplit(id) {
  state.splits = (state.splits||[]).filter(s => s.id !== id);
  renderSplit();
  saveToFirebase();
}

function renderSplit() {
  const el = document.getElementById('splitSection');
  if (!el) return;
  const splits = state.splits || [];
  const members = state.members || ['Sunny','小美','阿志','小華','阿明','小玲','阿強'];

  // calc per-person balance
  const balance = {};
  members.forEach(m => balance[m] = 0);
  splits.forEach(s => {
    const share = s.twd / s.members.length;
    s.members.forEach(m => { if(balance[m]!==undefined) balance[m] -= share; });
    if(balance[s.payer]!==undefined) balance[s.payer] += s.twd;
  });

  const totalJPY = splits.reduce((a,s)=>a+s.jpy,0);
  const totalTWD = splits.reduce((a,s)=>a+s.twd,0);

  el.innerHTML = `
    <!-- 設定人員 -->
    <div style="margin-bottom:14px;background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:14px 16px;">
      <div style="font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px;">成員名單（點名字可編輯）</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
        ${(state.members||members).map((m,i)=>`
          <span style="background:#fff;border:1px solid var(--border);border-radius:99px;padding:4px 10px;font-size:13px;display:flex;align-items:center;gap:5px;">
            ${m}
            <button onclick="delMember(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;">✕</button>
          </span>`).join('')}
        <button onclick="addMember()" style="background:var(--ink);color:#fff;border:none;border-radius:99px;padding:4px 12px;font-size:12px;cursor:pointer;">＋ 新增</button>
      </div>
    </div>

    <!-- 開銷列表 -->
    ${splits.length === 0 ? `<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px;">還沒有任何開銷，點「＋ 新增開銷」開始記帳</div>` : `
    <div style="overflow-x:auto;margin-bottom:14px;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="background:var(--cream);">
          <th style="padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);">項目</th>
          <th style="padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);">日幣 ¥</th>
          <th style="padding:8px 12px;text-align:right;border-bottom:1px solid var(--border);">台幣 NT$</th>
          <th style="padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);">付款人</th>
          <th style="padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);">分攤成員</th>
          <th style="padding:8px 4px;border-bottom:1px solid var(--border);"></th>
        </tr></thead>
        <tbody>
          ${splits.map(s=>`<tr style="border-bottom:0.5px solid var(--border);">
            <td style="padding:9px 12px;font-weight:500;">${esc(s.name)}</td>
            <td style="padding:9px 12px;text-align:right;">¥${s.jpy.toLocaleString()}</td>
            <td style="padding:9px 12px;text-align:right;color:var(--teal);">NT$${s.twd.toLocaleString()}</td>
            <td style="padding:9px 12px;text-align:center;"><span style="background:var(--accent-light);color:var(--accent);border-radius:99px;padding:2px 8px;font-size:11px;">${esc(s.payer)}</span></td>
            <td style="padding:9px 12px;font-size:11px;color:var(--muted);">${s.members.join('、')}</td>
            <td style="padding:9px 4px;"><button onclick="delSplit(${s.id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;">🗑</button></td>
          </tr>`).join('')}
          <tr style="background:var(--cream);font-weight:600;">
            <td style="padding:9px 12px;">合計</td>
            <td style="padding:9px 12px;text-align:right;">¥${totalJPY.toLocaleString()}</td>
            <td style="padding:9px 12px;text-align:right;color:var(--teal);">NT$${totalTWD.toLocaleString()}</td>
            <td colspan="3"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 個人結算 -->
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink);">個人結算</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px;">
      ${members.map(m=>{
        const b = Math.round(balance[m]||0);
        const color = b > 0 ? '#0f6e56' : b < 0 ? '#c0392b' : '#7a736a';
        const bg = b > 0 ? '#eaf3de' : b < 0 ? '#fbeaea' : '#f2ede4';
        const label = b > 0 ? `待收 NT$${b}` : b < 0 ? `待付 NT$${Math.abs(b)}` : '已結清';
        return `<div style="background:${b>0?'#eaf3de':b<0?'#fbeaea':'#f2ede4'};border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px;">${esc(m)}</div>
          <div style="font-size:12px;color:${color};font-weight:600;">${label}</div>
        </div>`;
      }).join('')}
    </div>

    <!-- 誰要付給誰 -->
    ${(()=>{
      // Debt settlement algorithm (minimize transactions)
      const debtors = members.map(m=>({name:m, amt:Math.round(balance[m]||0)}));
      const payers = debtors.filter(d=>d.amt>0).sort((a,b)=>b.amt-a.amt); // 待收
      const owes = debtors.filter(d=>d.amt<0).sort((a,b)=>a.amt-b.amt);   // 待付
      const txns = [];
      const p = payers.map(x=>({...x}));
      const o = owes.map(x=>({...x}));
      let pi=0, oi=0;
      while(pi<p.length && oi<o.length){
        const amount = Math.min(p[pi].amt, -o[oi].amt);
        if(amount>0) txns.push({from:o[oi].name, to:p[pi].name, amt:amount});
        p[pi].amt -= amount;
        o[oi].amt += amount;
        if(p[pi].amt===0) pi++;
        if(o[oi].amt===0) oi++;
      }
      if(txns.length===0) return '<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px;">✓ 目前無需轉帳</div>';
      return '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink);">轉帳清單</div>' +
        '<div style="display:flex;flex-direction:column;gap:8px;">' +
        txns.map(t=>`
          <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;">
            <span style="font-size:13px;font-weight:600;color:var(--accent);">${esc(t.from)}</span>
            <span style="font-size:12px;color:var(--muted);">→ 轉帳給 →</span>
            <span style="font-size:13px;font-weight:600;color:var(--teal);">${esc(t.to)}</span>
            <span style="margin-left:auto;font-size:14px;font-weight:700;color:var(--ink);">NT$${t.amt.toLocaleString()}</span>
          </div>`).join('') + '</div>';
    })()}`}
  `;
}

function addMember() {
  const name = prompt('輸入新成員名字：');
  if (!name || !name.trim()) return;
  if (!state.members) state.members = [];
  state.members.push(name.trim());
  renderSplit();
  saveToFirebase();
}

function delMember(i) {
  if (!state.members) return;
  state.members.splice(i, 1);
  renderSplit();
  saveToFirebase();
}

// ===================== 景點必買清單功能 =====================
let currentModalCtx = { di: null, ii: null };

function openBuyModal(di, ii) {
  currentModalCtx = { di, ii };
  const item = state.days[di].items[ii];
  if (!item.buys) item.buys = [];
  document.getElementById('buyModalTitle').textContent = '🛍 ' + item.label + ' - 必買物品';
  renderBuyList();
  document.getElementById('buyModalBg').classList.add('open');
}

function renderBuyList() {
  const item = state.days[currentModalCtx.di].items[currentModalCtx.ii];
  const listEl = document.getElementById('buyList');
  if (!item.buys || item.buys.length === 0) {
    listEl.innerHTML = '<li style="padding:20px 0;text-align:center;color:var(--muted);font-size:13px;">✦ 還沒有任何物品，快新增吧！</li>';
    return;
  }
  listEl.innerHTML = item.buys.map((buy, bi) =>
    `<li style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;margin-bottom:6px;background:var(--cream);border-radius:7px;border:0.5px solid var(--border);">` +
    `<span style="font-size:13px;color:var(--ink);display:flex;align-items:center;gap:8px;"><span style="color:#f4b8cf;font-size:15px;">♥</span>${esc(buy)}</span>` +
    `<button onclick="delBuyItem(${bi})" style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;white-space:nowrap;">✕ 刪除</button>` +
    `</li>`
  ).join('');
}

function addBuyItem() {
  const input = document.getElementById('buyInput');
  const text = input.value.trim();
  if (!text) return;
  const item = state.days[currentModalCtx.di].items[currentModalCtx.ii];
  if (!item.buys) item.buys = [];
  item.buys.push(text);
  input.value = '';
  renderBuyList();
  render();
  saveToFirebase();
}

function delBuyItem(bi) {
  const item = state.days[currentModalCtx.di].items[currentModalCtx.ii];
  item.buys.splice(bi, 1);
  renderBuyList();
  render();
  saveToFirebase();
}

function closeBuyModal() { document.getElementById('buyModalBg').classList.remove('open'); }
function closeBuyModalBg(e) { if(e.target===document.getElementById('buyModalBg')) closeBuyModal(); }
</script>

<div id="buyModalBg" class="modal-bg" onclick="closeBuyModalBg(event)">
  <div class="modal" style="padding:0;overflow:hidden;max-width:400px;">
    <div style="background:var(--ink);color:var(--paper);padding:16px 20px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">🌸</span>
      <span id="buyModalTitle" style="font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;flex:1;line-height:1.4;"></span>
      <button onclick="closeBuyModal()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1;padding:0;">×</button>
    </div>
    <div style="padding:16px 20px 20px;">
      <ul id="buyList" style="list-style:none;margin:0 0 14px;max-height:220px;overflow-y:auto;"></ul>
      <div style="display:flex;gap:8px;">
        <input type="text" id="buyInput" placeholder="輸入想買的物品..." onkeydown="if(event.key==='Enter')addBuyItem()" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;color:var(--ink);">
        <button onclick="addBuyItem()" style="background:var(--ink);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;">＋ 新增</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
